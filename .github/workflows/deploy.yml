name: CI / Deploy

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-doc-scanner-cv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend-check:
    name: Frontend — Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Biome lint + format check
        working-directory: frontend
        run: npx biome check src/

      - name: Type-check & build
        working-directory: frontend
        # vue-tsc is the type-checker; vite build confirms the bundle compiles
        run: npm run build

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend-check:
    name: Backend — Lint, Type-check & Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps required by OpenCV and the weight fetch
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglib2.0-0 \
            unzip

      - name: Install Python dependencies
        # requirements.txt carries the --extra-index-url for the torch +cpu wheels.
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Fetch EasyOCR model weights
        # Not committed to git (see README "OCR model weights"); app.py's
        # pre-warm needs them on disk before create_app() succeeds, so this
        # must run before any test that imports the app.
        working-directory: backend
        run: bash scripts/fetch_ocr_weights.sh

      - name: Ruff lint
        # Ruff is not in requirements.txt because it's a dev-only tool.
        # Pinned here to keep CI deterministic; bump deliberately.
        working-directory: backend
        run: |
          pip install ruff==0.4.4
          ruff check .

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short

  # ─── Deploy ──────────────────────────────────────────────────────────────────
  # Only runs on pushes to main after both check jobs pass.
  # PRs never reach this job.
  deploy:
    name: Deploy to VPS
    needs: [frontend-check, backend-check]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare staging directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            rm -rf ~/deploy_staging_doc_scanner
            mkdir -p ~/deploy_staging_doc_scanner

      - name: Copy source to staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # models/ is committed and must be included — ONNX runtime needs both
          # doc_classifier.onnx and doc_classifier.onnx.data at runtime.
          # scripts/ must be included: the Dockerfile's EasyOCR weight fetch
          # (COPY scripts/fetch_ocr_weights.sh .) needs it on the VPS to build.
          # All of these are inside the backend directory.
          source: "backend,frontend,Dockerfile,.dockerignore,docker-compose.yml,docker-compose.gpu.yml,start_docker.ps1,install_native.ps1"
          target: "/home/${{ secrets.SSH_USER }}/deploy_staging_doc_scanner"
          strip_components: 0

      - name: Sync, build & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            STAGING=~/deploy_staging_doc_scanner
            APP=~/doc-scanner-cv

            echo "==> Syncing source..."
            rsync -a --delete \
              --exclude='.env' \
              --exclude='node_modules' \
              --exclude='dist' \
              --exclude='data' \
              --exclude='instance' \
              "$STAGING/" "$APP/"

            echo "==> Building image..."
            cd "$APP"
            docker compose build doc-scanner-cv worker

            echo "==> Restarting containers..."
            docker compose up -d --remove-orphans

            echo "==> Verifying health..."
            EXPECTED=$(docker compose config --services | wc -l)
            for i in $(seq 1 12); do
              RUNNING=$(docker compose ps --status running -q | wc -l)
              if [ "$RUNNING" -ge "$EXPECTED" ]; then
                echo "Deployment OK ($RUNNING/$EXPECTED containers running)"
                docker compose ps
                rm -rf "$STAGING"
                exit 0
              fi
              echo "Waiting... ($RUNNING/$EXPECTED running, attempt $i/12)"
              sleep 5
            done

            echo "Deployment FAILED — only $RUNNING/$EXPECTED containers running after 60s"
            docker compose ps
            docker compose logs --tail=50
            exit 1