services:
  redis:
    image: redis:7-alpine
    container_name: doc-scanner-redis
    restart: always
    networks:
      - internal

  doc-scanner-cv:
    build: .
    container_name: doc-scanner-cv
    restart: unless-stopped
    working_dir: /app/backend
    command: ["python", "-m", "gunicorn", "-w", "4", "-b", "0.0.0.0:5000", "app:create_app()"]
    environment:
      # Read from the host .env (compose substitutes ${...}). Required for OCR
      # cleanup; if unset the app simply skips cleanup and returns raw text.
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/instance:/app/backend/instance   # Persists scans.db outside the container
      - shared-uploads:/app/storage
    expose:
      - "5000"
    depends_on:
      - redis
    networks:
      - internal

  worker:
    build: .
    container_name: doc-scanner-worker
    restart: unless-stopped
    working_dir: /app/backend
    command: celery -A tasks.celery_app worker -l info --max-memory-per-child=500000 --max-tasks-per-child=10
    environment:
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - VECLIB_MAXIMUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/instance:/app/backend/instance
      - shared-uploads:/app/storage
    depends_on:
      - redis
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-doc-scanner-cv
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - doc-scanner-cv
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  shared-uploads:
