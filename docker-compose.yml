services:
  doc-scanner-cv:
    build: .
    container_name: doc-scanner-cv
    restart: unless-stopped
    environment:
      # Read from the host .env (compose substitutes ${...}). Required for OCR
      # cleanup; if unset the app simply skips cleanup and returns raw text.
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ./data:/app/instance   # Persists scans.db outside the container
    expose:
      - "5000"
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-doc-scanner-cv
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - doc-scanner-cv
    networks:
      - internal

networks:
  internal:
    driver: bridge
